<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer 2D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #111;
            font-family: Arial, sans-serif;
            color: white;
        }

        canvas {
            background-color: #222;
        }

        #placar {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
            z-index: 10;
            position: absolute;
            top: 20px;
        }

        .time-vermelho {
            color: #d63031;
        }

        .time-azul {
            color: #0984e3;
        }
    </style>
</head>

<body>
    <div id="placar">
        <span class="time-vermelho">0</span> - <span class="time-azul">0</span>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p2.js/0.7.1/p2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.3/pixi.min.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
